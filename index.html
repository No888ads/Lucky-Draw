<!DOCTYPE html>
<html>
<head>
    <title> Lucky Draw </title>
    <link rel="icon" type="image/png" href="HL_Transparent.png?v=1">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/2.1.3/TweenMax.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/zarocknz/javascript-winwheel@master/Winwheel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/smartcrop/2.0.5/smartcrop.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root {
            --royal-blue: #4169E1;
            --dark-navy: #1a237e;
            --gold: #D4AF37;
            --soft-white: #ffffff;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            margin: 0; 
            display: flex;
            flex-direction: column;
            min-height: 100vh; 
            background: linear-gradient(135deg, var(--royal-blue), var(--dark-navy)); 
            overflow-x: hidden;
        }
        
        #main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        /* --- LOGIN CARD BEAUTIFIED --- */
        .card { 
            background: rgba(255, 255, 255, 0.15); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px 30px; 
            border-radius: 25px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.3); 
            color: white; 
            text-align: center; 
            width: 380px; 
            border: 1px solid rgba(255,255,255,0.2);
        }

        #staffName {
            padding: 15px; border-radius: 12px; border: none;
            background: white; font-size: 16px; width: 85%;
            margin-bottom: 25px; text-align: center; font-weight: 600;
            color: var(--dark-navy); outline: none;
        }

        .btn-login {
            padding: 15px 40px; border-radius: 50px; border: none;
            background: linear-gradient(45deg, var(--dark-navy), var(--royal-blue));
            color: white; cursor: pointer; font-weight: 800; font-size: 16px;
            text-transform: uppercase; transition: 0.4s; width: 90%;
        }
        .btn-login:hover { background: var(--gold); color: var(--dark-navy); transform: scale(1.05); }

        #wheel-page { 
            display: none; 
            flex-direction: row; 
            align-items: center; 
            justify-content: space-between; 
            width: 98%; 
            max-width: 1400px;
            gap: 20px;
            padding: 40px 20px;
        }
        
        /* --- PROFILE BOX --- */
        #award-box {
            position: relative;
            width: 340px;
            height: 550px;
            background: white;
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            z-index: 1;
        }

        /* --- CAHAYA BELAKANG GAMBAR BULAT --- */
        .profile-glow-ring {
            position: absolute;
            top: 145px; /* Adjust tepat di belakang gambar Noel */
            left: 50%;
            transform: translate(-50%, -50%);
            width: 240px;
            height: 240px;
            border-radius: 50%;
            background: conic-gradient(transparent, var(--gold), transparent 40%);
            animation: rotateShine 4s linear infinite;
            z-index: 0; /* Di belakang kandungan */
        }

        @keyframes rotateShine {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .shimmer-name {
            margin: 10px 0 5px;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 18px;
            color: var(--dark-navy);
            background: linear-gradient(to right, var(--dark-navy) 20%, var(--gold) 40%, var(--gold) 60%, var(--dark-navy) 80%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shineName 3s linear infinite;
        }
        @keyframes shineName { to { background-position: 200% center; } }

        .box-title {
            margin: 0 0 15px 0; color: var(--dark-navy); text-align: center;
            border-bottom: 2px solid var(--gold); padding-bottom: 10px;
            font-size: 18px; letter-spacing: 1px; font-weight: 800;
        }

        #award-display { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        .award-item { text-align: center; width: 100%; position: relative; z-index: 5; }
        
        .award-photo {
            width: 220px; height: 220px; 
            margin: 5px auto 10px;
            position: relative;
            display: flex; align-items: center; justify-content: center;
        }

        .wreath-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 3;
            pointer-events: none;
        }

        .photo-crop-container {
            width: 132px; height: 132px;
            border-radius: 50%;
            overflow: hidden;
            position: relative;
            z-index: 2;
            background: #fff;
            margin-top: -6px; 
        }

        .award-photo img.staff-img {
            position: absolute !important;
            max-width: none !important;
            width: auto !important; height: auto !important;
            display: block;
            top: 0; left: 0;
        }

        .medal-overlay {
            position: absolute;
            bottom: 20px; right: 20px;
            width: 65px; height: auto;
            z-index: 10;
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.4));
        }

        /* --- DETAILS BOX --- */
        .staff-details {
            text-align: left; background: #f8f9fa;
            padding: 12px; border-radius: 12px;
            border-left: 4px solid var(--gold);
            margin-top: 5px;
        }
        .staff-details div { font-size: 13px; margin-bottom: 4px; color: #444; }

        .wheel-container-main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #canvasContainer { position: relative; background: rgba(255, 255, 255, 0.1); padding: 10px; border-radius: 50%; }
        .pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 18px solid transparent; border-right: 18px solid transparent; border-top: 35px solid #ff4757; z-index: 10; }
        .control-box { margin-top: 25px; background: white; padding: 5px 10px; border-radius: 50px; display: inline-flex; align-items: center; gap: 8px; box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
        #code { text-align: center; font-size: 14px; font-weight: 800; color: var(--dark-navy); border: none; width: 70px; outline: none; }
        .btn-main { padding: 10px 15px; border-radius: 30px; border: none; background: var(--dark-navy); color: white; cursor: pointer; font-weight: 700; font-size: 13px; transition: 0.3s; }

        #leaderboard {
            width: 340px; height: 550px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px; border: 2px solid var(--gold);
            padding: 20px; display: flex; flex-direction: column; box-sizing: border-box;
        }

        #winner-list { flex: 1; overflow-y: auto; margin-top: 5px; font-size: 13px; }
        .winner-item { padding: 8px 0; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; }

        footer { 
            width: 100%; background: rgba(10, 15, 60, 0.95); color: white; 
            padding: 15px 60px; display: flex; justify-content: space-between; 
            align-items: center; backdrop-filter: blur(10px); box-sizing: border-box; 
            margin-top: auto;
        }
        .footer-logo-img { height: 65px; width: auto; transform: scale(1.4); transform-origin: left bottom; filter: drop-shadow(0px 0px 5px rgba(255,255,255,0.2)); }
        
        .footer-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
        .social-icons { display: flex; gap: 15px; margin-bottom: 5px; }
        .social-icons a { color: #fff; font-size: 20px; transition: 0.3s; opacity: 0.8; }
        .social-icons a:hover { color: var(--gold); opacity: 1; transform: translateY(-3px); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="main-content">
    <div id="home-page">
        <img src="H&L transparent.png" alt="Company Logo" class="company-logo">
        <div class="card">
            <h2 style="margin: 0 0 10px 0;">🎡 Lucky Draw</h2>
            <p style="font-size: 14px; margin-bottom: 20px;">Staff Portal Access</p>
            <input type="text" id="staffName" placeholder="ENTER STAFF ID" maxlength="6">
            <br>
            <button class="btn-login" onclick="generateCode()">LOGIN</button>
        </div>
    </div>

    <div id="wheel-page">
        <div id="award-box">
            <h3 class="box-title">LONG SERVICE AWARD RECIPIENT 2026</h3>
            <div id="award-display"></div>
        </div>

        <div class="wheel-container-main">
            <h1 style="color: white; margin-bottom: 20px;">Good Luck!</h1>
            <div id="canvasContainer">
                <div class="pointer"></div>
                <canvas id="wheelCanvas" width="450" height="450"></canvas>
            </div>
            <div class="control-box">
                <input type="text" id="code" readonly>
                <button id="spinBtn" class="btn-main" onclick="spin()">SPIN NOW!</button>
            </div>
        </div>

        <div id="leaderboard">
            <h3 class="box-title">🏆 LUCKY WINNERS</h3>
            <div id="winner-list"></div>
        </div>
    </div>
</div>

<footer>
    <div class="footer-left">
        <img src="H&L transparent.png" alt="Logo" class="footer-logo-img">
        <div class="footer-copyright">© 2026 H & L Retail Sdn. Bhd.</div>
    </div>
    <div class="footer-right">
        <div class="social-icons">
            <a href="https://www.facebook.com/HnLsupermarket" target="_blank"><i class="fab fa-facebook"></i></a>
            <a href="https://www.instagram.com/hnl_retail" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://www.tiktok.com/@hnl_retail" target="_blank"><i class="fab fa-tiktok"></i></a>
            <a href="https://www.hlgroup.com.my/" target="_blank"><i class="fa fa-globe"></i></a>
        </div>
        <div style="opacity: 0.8; font-size: 14px;">Made with ❤️ from H & L</div>
    </div>
</footer>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyCSwkGsdm8D5I_RkgEN61FrZn88zROpbH4",
    authDomain: "lucky-draw-66c24.firebaseapp.com",
    projectId: "lucky-draw-66c24",
    storageBucket: "lucky-draw-66c24.firebasestorage.app",
    messagingSenderId: "74967658228",
    appId: "1:74967658228:web:759c4e5419362838cff8a1"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const staffDatabase = {
    "100002": {name: "FOO YEN PING", years: "25 YEARS", photo: "Foo Yen Ping.jpg", outlet: "HQ", position: "Senior Merchandising Officer", dateJoin: "01/06/2000" },
    "210913": {name: "NOEL ETHAN", years: "69 YEARS", photo: "noel.jpeg", outlet: "HQ", position: "Sukat Office", dateJoin: "01/12/1957" },
    "206960": {name: "BASILIO APAU ANAK GREGORY", years: "10 YEARS", photo: "BASILIO APAU ANAK GREGORY.jpg", outlet: "10th Mile", position: "Senior Cashier", dateJoin: "21/12/2015" }
};

const prizeImages = { 
    "Consolation Prize": "cawan.png",
    "Prize 1": "1.1.png", "Prize 2": "2.2.png", "Prize 3": "3.3.png"
};

let theWheel, availablePrizes = [];

async function generateCode() {
    const idInput = document.getElementById("staffName").value.trim();
    if (!staffDatabase[idInput]) return Swal.fire("Denied", "Staff ID not found.", "error");

    try {
        Swal.showLoading();
        const success = await loadPrizes();
        if (!success) return;

        const staff = staffDatabase[idInput];
        let medalImg = "10 years.png"; 
        if (staff.years.includes("25")) medalImg = "25 years.png";
        else if (staff.years.includes("15")) medalImg = "15 years.png";

        // --- RENDER DENGAN GLOW RING ---
        document.getElementById('award-display').innerHTML = `
            <div class="profile-glow-ring"></div>
            <div class="award-item">
                <div class="award-photo">
                    <img src="bingkai2.png" class="wreath-overlay">
                    <div class="photo-crop-container">
                        <img src="${staff.photo}" class="staff-img" id="staffImg">
                    </div>
                    <img src="${medalImg}" class="medal-overlay" alt="Medal">
                </div>
                <h4 class="shimmer-name">${staff.name}</h4>
                <div class="staff-details">
                    <div><b>Outlet:</b> ${staff.outlet}</div>
                    <div><b>Position:</b> ${staff.position}</div>
                    <div><b>Date Join:</b> ${staff.dateJoin}</div>
                    <div><b>Service Period:</b> ${staff.years}</div>
                </div>
            </div>`;

        applySmartCrop(document.getElementById('staffImg'));
        document.getElementById("home-page").style.display = "none";
        document.getElementById("wheel-page").style.display = "flex";
        
        const newCode = "LCK" + Math.floor(1000 + Math.random() * 9000);
        document.getElementById("code").value = newCode;
        await db.collection("users").doc(newCode).set({ name: staff.name, used: false, prize: "", timestamp: firebase.firestore.FieldValue.serverTimestamp() });
        Swal.close();
    } catch (e) { Swal.fire("Error", "Check Connection.", "error"); }
}

function applySmartCrop(img) {
    const targetSize = 132;
    img.onload = function() {
        smartcrop.crop(img, { width: targetSize, height: targetSize }).then(function(result) {
            const crop = result.topCrop;
            const scale = targetSize / crop.width;
            img.style.setProperty('width', (img.naturalWidth * scale) + 'px', 'important');
            img.style.setProperty('height', (img.naturalHeight * scale) + 'px', 'important');
            img.style.setProperty('left', (-crop.x * scale) + 'px', 'important');
            img.style.setProperty('top', (-crop.y * scale) + 'px', 'important');
        });
    };
    if (img.complete) img.onload();
}

async function loadPrizes() {
    try {
        const snapshot = await db.collection("prizes_stock").where("stock", ">", 0).get();
        availablePrizes = snapshot.docs.map(doc => doc.id);
        if (availablePrizes.length === 0) { Swal.fire("Ralat", "Hadiah habis.", "error"); return false; }
        
        let segments = availablePrizes.map((p, i) => ({ 'fillStyle': i % 2 ? '#1a237e' : '#D4AF37', 'text': p, 'textFillStyle': 'white' }));
        theWheel = new Winwheel({
            canvasId: 'wheelCanvas', numSegments: segments.length, segments: segments,
            animation: { 'type': 'spinToStop', 'duration': 5, 'spins': 8, 'callbackFinished': showResult }
        });
        listenToLeaderboard();
        return true;
    } catch(e) { return false; }
}

function listenToLeaderboard() {
    db.collection("users").where("used", "==", true).onSnapshot(s => {
        const list = document.getElementById("winner-list");
        list.innerHTML = "";
        s.docs.forEach(d => {
            const data = d.data();
            list.innerHTML += `<div class="winner-item"><strong>${data.name}</strong> <span>${data.prize}</span></div>`;
        });
    });
}

function spin() {
    if (!availablePrizes.length) return;
    document.getElementById("spinBtn").disabled = true;
    theWheel.startAnimation();
}

async function showResult() {
    let prize = theWheel.getIndicatedSegment().text;
    const code = document.getElementById("code").value;
    await db.collection("users").doc(code).update({ used: true, prize: prize });
    Swal.fire("🎉 Tahniah!", `Nama Staff Telah Direkodkan!\nAnda menang: ${prize}`, "success");
}
</script>
</body>
</html>
