<!DOCTYPE html>
<html>
<head>
    <title> Lucky Draw </title>
    <link rel="icon" type="image/png" href="HL_Transparent.png?v=1">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/2.1.3/TweenMax.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/zarocknz/javascript-winwheel@master/Winwheel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --royal-blue: #4169E1;
            --dark-navy: #1a237e;
            --gold: #D4AF37;
            --soft-white: #ffffff;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            margin: 0; 
            display: flex;
            flex-direction: column;
            min-height: 100vh; 
            background: linear-gradient(135deg, var(--royal-blue), var(--dark-navy)); 
            overflow-x: hidden;
        }
        
        #main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        #home-page { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; }
        .company-logo { width: 180px; height: auto; margin-bottom: 20px; filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.3)); }
        .card { background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); color: #333; text-align: center; width: 350px; }

        #wheel-page { 
            display: none; 
            flex-direction: row; 
            align-items: center; 
            justify-content: space-between; 
            width: 98%; 
            max-width: 1400px;
            gap: 20px;
            padding: 40px 20px;
        }
        
        #award-box, #leaderboard {
            width: 320px;
            height: 520px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            border: 2px solid var(--gold);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        .box-title {
            margin: 0 0 15px 0; color: var(--dark-navy); text-align: center;
            border-bottom: 2px solid var(--gold); padding-bottom: 10px;
            font-size: 18px; letter-spacing: 1px; font-weight: 800;
        }

        #award-display { flex: 1; display: flex; align-items: center; justify-content: center; }
        .award-item { text-align: center; animation: fadeIn 0.8s ease-in-out; }
        .award-photo img {
            width: 160px; height: 160px; border-radius: 50%;
            border: 4px solid var(--gold); object-fit: cover;
            margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .award-info h4 { margin: 5px 0; color: var(--dark-navy); font-size: 18px; }
        .award-info p { margin: 0; color: var(--gold); font-weight: bold; font-size: 14px; text-transform: uppercase; }

        .wheel-container-main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .wheel-title { margin-bottom: 25px; color: white; font-size: 28px; font-weight: 800; text-shadow: 2px 3px 6px rgba(0,0,0,0.3); }
        #canvasContainer { position: relative; background: rgba(255, 255, 255, 0.1); padding: 10px; border-radius: 50%; box-shadow: 0 0 30px rgba(0,0,0,0.2); }
        .pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 18px solid transparent; border-right: 18px solid transparent; border-top: 35px solid #ff4757; z-index: 10; filter: drop-shadow(0 3px 5px rgba(0,0,0,0.3)); }
        
        .control-box { margin-top: 25px; background: white; padding: 5px 10px; border-radius: 50px; box-shadow: 0 8px 20px rgba(0,0,0,0.3); display: inline-flex; align-items: center; justify-content: center; gap: 8px; width: auto; max-width: 250px; }
        #code { text-align: center; font-size: 14px; font-weight: 800; color: var(--dark-navy); border: none; background: transparent; width: 70px; outline: none; border-right: 2px solid #eee; padding-right: 10px; }
        .btn-main { padding: 10px 15px; border-radius: 30px; border: none; background: var(--dark-navy); color: white; cursor: pointer; font-weight: 700; font-size: 13px; transition: 0.3s; white-space: nowrap; }

        #winner-list { flex: 1; overflow-y: auto; margin-top: 5px; font-size: 13px; }
        .winner-item { padding: 8px 0; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; }
        .winner-prize { color: var(--royal-blue); font-weight: 700; }

        footer {
            width: 100%; background: rgba(10, 15, 60, 0.95); color: white; padding: 15px 60px;
            display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: blur(10px); box-sizing: border-box; z-index: 1000; margin-top: auto;
        }
        .footer-logo-img { height: 65px; width: auto; transform: scale(1.4); transform-origin: left bottom; margin-right: 20px; filter: drop-shadow(0px 0px 5px rgba(255,255,255,0.2)); }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="main-content">
    <div id="home-page">
        <img src="H&L transparent.png" alt="Company Logo" class="company-logo">
        <div class="card">
            <h2 style="color: var(--royal-blue); margin: 0 0 10px 0;">🎡 Lucky Draw</h2>
            <p style="color: #666; font-size: 14px; margin-bottom: 20px;">Please enter your full name to login</p>
            <input type="text" id="staffName" placeholder="Example: Noel Ethan" style="padding: 12px; border-radius: 10px; border: 2px solid #e2e8f0; font-size: 14px; width: 85%; margin-bottom: 20px;">
            <br>
            <button class="btn-main" style="font-size: 16px; padding: 12px 30px;" onclick="generateCode()">LOGIN</button>
        </div>
    </div>

    <div id="wheel-page">
        <div id="award-box">
            <h3 class="box-title">🎖️ LONG SERVICE</h3>
            <div id="award-display"></div>
        </div>

        <div class="wheel-container-main">
            <h1 class="wheel-title">Good Luck!</h1>
            <div id="canvasContainer">
                <div class="pointer"></div>
                <canvas id="wheelCanvas" width="450" height="450"></canvas>
            </div>
            <div class="control-box">
                <input type="text" id="code" readonly>
                <button id="spinBtn" class="btn-main" onclick="spin()">SPIN NOW!</button>
            </div>
        </div>

        <div id="leaderboard">
            <h3 class="box-title">🏆 LUCKY WINNERS</h3>
            <div id="winner-list">
                <p style="text-align: center; color: #94a3b8; margin-top: 20px;">Waiting for winners...</p>
            </div>
        </div>
    </div>
</div>

<footer>
    <div class="footer-left">
        <img src="H&L transparent.png" alt="Logo" class="footer-logo-img">
        <div class="footer-copyright">© 2026 H & L Retail Sdn. Bhd.</div>
    </div>
    <div class="footer-right">
        <div class="footer-made-with" style="opacity: 0.8; font-size: 13px; text-align: right;">Made with ❤️ from H & L</div>
    </div>
</footer>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyCSwkGsdm8D5I_RkgEN61FrZn88zROpbH4",
    authDomain: "lucky-draw-66c24.firebaseapp.com",
    projectId: "lucky-draw-66c24",
    storageBucket: "lucky-draw-66c24.firebasestorage.app",
    messagingSenderId: "74967658228",
    appId: "1:74967658228:web:759c4e5419362838cff8a1"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// DATA STAFF: Noel, sila pastikan nama di sini sama dengan input staff
const staffDatabase = {
    "FOO YEN PING": { years: "15 YEARS", 
        photo: "boss.jpeg", 
        outlet: "HQ", 
        position: "HR Manager", 
        dateJoin: "15/05/2011"},
    "LAI YEE SIUNG": { years: "5 YEARS", photo: "staff2.png" },
    "ROSNI ANAK POSENG": { years: "5 YEARS", photo: "staff2.png" },
    "CHONG JEW HIN": { years: "5 YEARS", photo: "staff2.png" },
    "TAN KIM YEAN": { years: "5 YEARS", photo: "staff2.png" },
    "NORHAYATI BINTI SUUT": { years: "5 YEARS", photo: "staff2.png" },
    "SITI AISHAH BINTI KALAHIM": { years: "5 YEARS", photo: "staff2.png" },
    "MAHAMAD RIZUAN BIN MADZHI": { years: "5 YEARS", photo: "staff2.png" },
    "DESY ANAK LUKAN": { years: "5 YEARS", photo: "staff2.png" },
    "CHRISTINA CHENDU ANAK FRANCIS": { years: "5 YEARS", photo: "staff2.png" },
    "SOFHIA PETI ANAK PETER": { years: "5 YEARS", photo: "staff2.png" },
    "SITI NORAISHAH BINTI UTEH": { years: "5 YEARS", photo: "staff2.png" },
    "LOW CHIN TING": { years: "5 YEARS", photo: "staff2.png" },
    "PETER MATIUS ANAK NYOGEM": { years: "5 YEARS", photo: "staff2.png" },
    "ROS ANAK ROBERT BOBIL": { years: "5 YEARS", photo: "staff2.png" },
    "SITI ANAK AMPING": { years: "5 YEARS", photo: "staff2.png" },
    "ARTI BINTI SAIT": { years: "5 YEARS", photo: "staff2.png" },
    "JENNIFER TANI ANAK JOHNNY": { years: "5 YEARS", photo: "staff2.png" },
    "SHERON ANAK EGAT": { years: "5 YEARS", photo: "staff2.png" },
    "PETER ANAK EDWARD AHOW": { years: "5 YEARS", photo: "staff2.png" },
    "SITI RASHIDAH BINTI AHMAD": { years: "5 YEARS", photo: "staff2.png" },
    "KHO BEE IAN": { years: "5 YEARS", photo: "staff2.png" },
    "BIBI ERNNA BINTI MUHAMMAD FIRDAUS": { years: "5 YEARS", photo: "staff2.png" },
    "STEPHANIE NADIA ANAK ALAN": { years: "5 YEARS", photo: "staff2.png" },
    "SHARON ANAK SAMAT": { years: "5 YEARS", photo: "staff2.png" },
    "BASILIO APAU ANAK GREGORY": { years: "5 YEARS", photo: "staff2.png" },
    "NOEL ETHAN": { years: "5 YEARS", photo: "noel.png" } // Contoh Noel
};

const prizeImages = { 
    "Consolation Prize": "https://cdn-icons-png.flaticon.com/512/1791/1791385.png",
    "Prize 1": "1.png", "Prize 2": "2.png", "Prize 3": "3.png", "Prize 4": "4.png", "Prize 5": "5.png",
    "Prize 6": "6.png", "Prize 7": "7.png", "Prize 8": "8.png", "Prize 9": "9.png", "Prize 10": "10.png",
    "Prize 11": "11.png", "Prize 12": "12.png", "Prize 13": "13.png", "Prize 14": "14.png", "Prize 15": "15.png"
};

let theWheel, availablePrizes = [];
const winSound = new Audio('win.mp3'), loseSound = new Audio('lose.mp3');

async function generateCode() {
    const nameInput = document.getElementById("staffName").value.trim().toUpperCase();
    
    // Check if staff exists in our local database
    if (!staffDatabase[nameInput]) {
        return Swal.fire("Denied", "Name not found in record.", "error");
    }

    try {
        const q = await db.collection("users").where("name", "==", nameInput).get();
        if (!q.empty) return Swal.fire("Error", "You have already participated!", "error");
        
        const success = await loadPrizes();
        if (!success) return;

        // DISPLAY LOGGED IN STAFF INFO
        const staff = staffDatabase[nameInput];
        document.getElementById('award-display').innerHTML = `
            <div class="award-item">
                <div class="award-photo">
                    <img src="${staff.photo}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3135/3135715.png'">
                </div>
                <div class="award-info">
                    <h4>${nameInput}</h4>
                    <p>${staff.years} SERVICE</p>
                </div>
            </div>`;

        const newCode = "LCK" + Math.floor(1000 + Math.random() * 9000);
        await db.collection("users").doc(newCode).set({ name: nameInput, used: false, prize: "", timestamp: null });
        
        document.getElementById("code").value = newCode;
        document.getElementById("home-page").style.display = "none";
        document.getElementById("wheel-page").style.display = "flex";
        
        // Unlock sound
        winSound.play().then(() => { winSound.pause(); winSound.currentTime = 0; }).catch(() => {});

    } catch (e) { Swal.fire("Error", "Database error.", "error"); }
}

// ... (Fungsi loadPrizes, listenToLeaderboard, spin, showResult kekal sama seperti sebelum ini) ...

async function loadPrizes() {
    const snapshot = await db.collection("prizes_stock").where("stock", ">", 0).get();
    availablePrizes = [];
    snapshot.forEach(doc => availablePrizes.push(doc.id));
    if (availablePrizes.length === 0) { Swal.fire("Finished", "All prizes won!", "info"); return false; }
    availablePrizes.sort(() => Math.random() - 0.5);
    let segments = availablePrizes.map((p, i) => {
        const colors = ['#1a237e', '#D4AF37', '#283593', '#C5A028', '#3949ab'];
        return { 'fillStyle': colors[i % colors.length], 'text': p, 'textFillStyle': 'white', 'fontSize': 14 };
    });
    theWheel = new Winwheel({
        canvasId: 'wheelCanvas', numSegments: segments.length, segments: segments,
        animation: { 'type': 'spinToStop', 'duration': 10, 'spins': 15, 'callbackFinished': showResult }
    });
    theWheel.draw();
    listenToLeaderboard();
    return true;
}

function listenToLeaderboard() {
    db.collection("users").where("used", "==", true).onSnapshot((snapshot) => {
        const listDiv = document.getElementById("winner-list");
        listDiv.innerHTML = "";
        let winners = [];
        snapshot.forEach((doc) => winners.push(doc.data()));
        winners.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
        winners.forEach((data) => {
            if (data.prize && data.prize !== "" && data.prize !== "Consolation Prize") {
                const item = document.createElement("div");
                item.className = "winner-item";
                item.innerHTML = `<strong>${data.name}</strong> <span class="winner-prize">${data.prize}</span>`;
                listDiv.appendChild(item);
            }
        });
    });
}

function spin() {
    window.chosenPrize = availablePrizes[Math.floor(Math.random() * availablePrizes.length)];
    let stopIndex = 1;
    theWheel.segments.forEach((s, i) => { if (s && s.text === window.chosenPrize) stopIndex = i; });
    theWheel.animation.stopAngle = theWheel.getRandomForSegment(stopIndex);
    document.getElementById("spinBtn").disabled = true;
    theWheel.startAnimation();
}

async function showResult() {
    let prizeText = theWheel.getIndicatedSegment().text;
    const code = document.getElementById("code").value;
    const docRef = db.collection("users").doc(code);
    if(prizeText !== "Consolation Prize") {
        winSound.play().catch(() => {});
        await db.collection("prizes_stock").doc(prizeText).update({ stock: firebase.firestore.FieldValue.increment(-1) });
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
    } else { loseSound.play().catch(() => {}); }
    await docRef.update({ used: true, prize: prizeText, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
    Swal.fire({
        title: prizeText === "Consolation Prize" ? 'OH NO!' : '🎉 CONGRATS! 🎉',
        html: `<b style="font-size: 20px;">${prizeText === "Consolation Prize" ? "Try again!" : "You won " + prizeText}</b>`,
        imageUrl: prizeImages[prizeText] || 'default.png', imageWidth: 200, imageHeight: 200, confirmButtonColor: '#1a237e'
    }).then(() => {
        document.getElementById("spinBtn").innerText = "FINISHED";
    });
}
</script>
</body>
</html>
