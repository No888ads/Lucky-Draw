<!DOCTYPE html>
<html>
<head>
    <title> Lucky Draw </title>
    <link rel="icon" type="image/png" href="H&L Transparent (Blue).png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/2.1.3/TweenMax.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/zarocknz/javascript-winwheel@master/Winwheel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --royal-blue: #4169E1;
            --dark-navy: #1a237e;
            --gold: #D4AF37;
            --soft-white: #ffffff;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            margin: 0; 
            overflow: hidden; 
            background: linear-gradient(135deg, var(--royal-blue), var(--dark-navy)); 
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        #home-page { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            width: 100%;
            padding-bottom: 100px; /* Jarak tambahan untuk footer besar */
        }

        .company-logo { 
            width: 180px; height: auto; margin-bottom: 20px; 
            filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.3)); 
        }

        .card { 
            background: rgba(255, 255, 255, 0.95); 
            padding: 30px; border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.4); 
            color: #333; text-align: center; width: 350px; 
        }

        #wheel-page { 
            display: none; 
            flex-direction: row; 
            align-items: center; 
            justify-content: space-between; 
            width: 95%; 
            max-width: 1200px;
            padding: 20px 20px 120px 20px; /* Jarak bawah ditambah */
        }
        
        .wheel-container-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .wheel-title { 
            margin-bottom: 25px; color: white; 
            font-size: 28px; font-weight: 800; 
            text-shadow: 2px 3px 6px rgba(0,0,0,0.3);
            letter-spacing: 1px;
        }

        #canvasContainer { 
            position: relative; 
            background: rgba(255, 255, 255, 0.1);
            padding: 10px; border-radius: 50%;
            box-shadow: 0 0 30px rgba(0,0,0,0.2);
        }

        .pointer {
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; border-left: 18px solid transparent; border-right: 18px solid transparent;
            border-top: 35px solid #ff4757; z-index: 10; filter: drop-shadow(0 3px 5px rgba(0,0,0,0.3));
        }

        .control-box {
            margin-top: 25px; 
            background: white; 
            padding: 8px 15px; 
            border-radius: 50px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            display: inline-flex; 
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: auto;
            max-width: 300px;
        }

        #code { 
            text-align: center; 
            font-size: 18px; 
            font-weight: 800; 
            color: var(--dark-navy); 
            border: none; 
            background: transparent; 
            width: 90px; 
            outline: none; 
            border-right: 2px solid #eee; 
            padding-right: 10px;
        }

        .btn-main { 
            padding: 10px 20px; 
            border-radius: 30px; 
            border: none; 
            background: var(--dark-navy); 
            color: white; 
            cursor: pointer; 
            font-weight: 700; 
            font-size: 13px; 
            transition: 0.3s;
            white-space: nowrap;
        }

        .btn-main:hover { background: var(--gold); color: var(--dark-navy); }
        .btn-main:disabled { background: #94a3b8; cursor: not-allowed; }

        #leaderboard {
            width: 320px; 
            height: 500px; 
            background: rgba(255, 255, 255, 0.95); 
            border-radius: 20px; 
            box-shadow: 0 12px 30px rgba(0,0,0,0.3);
            padding: 20px; 
            display: flex; 
            flex-direction: column;
            margin-left: auto; 
        }

        #winner-list { flex-grow: 1; overflow-y: auto; margin-top: 15px; font-size: 14px; }
        .winner-item {
            padding: 10px; border-bottom: 1px solid #f1f5f9;
            display: flex; justify-content: space-between; align-items: center;
        }
        .winner-prize { color: var(--royal-blue); font-weight: 700; }

        input[type="text"] { 
            padding: 12px; border-radius: 10px; border: 2px solid #e2e8f0; 
            font-size: 14px; width: 85%; margin-bottom: 20px;
        }

        /* Footer Styles - Diperbesarkan */
        footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(10, 15, 60, 0.95);
            color: white;
            padding: 20px 60px; /* Padding lebih besar */
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            box-sizing: border-box;
            z-index: 1000;
        }
        .footer-left { display: flex; flex-direction: column; gap: 8px; }
        .footer-logo-text { margin-bottom: 2px; display: flex; align-items: center; }
        
        /* Saiz logo diperbesarkan */
        .footer-logo-img { height: 45px; width: auto; } 
        
        /* Saiz teks copyright diperbesarkan */
        .footer-copyright { opacity: 0.8; font-size: 16px; font-weight: 500; } 
        
        .footer-right { text-align: right; }
        .social-links { display: flex; gap: 25px; margin-bottom: 8px; justify-content: flex-end; }
        .social-links a { color: white; font-size: 22px; transition: 0.3s; }
        .social-links a:hover { color: var(--gold); }
        .footer-made-with { opacity: 0.8; font-size: 15px; }
    </style>
</head>
<body>

<div id="home-page">
    <img src="H&L transparent.png" alt="Company Logo" class="company-logo">
    <div class="card">
        <h2 style="color: var(--royal-blue); margin: 0 0 10px 0;">🎡 Lucky Draw</h2>
        <p style="color: #666; font-size: 14px; margin-bottom: 20px;">Please enter your full name to start</p>
        <input type="text" id="staffName" placeholder="Example: Noel Ethan">
        <br>
        <button class="btn-main" style="font-size: 16px; padding: 12px 30px;" onclick="generateCode()">LOGIN</button>
    </div>
</div>

<div id="wheel-page">
    <div class="wheel-container-main">
        <h1 class="wheel-title">Good Luck!</h1>
        <div id="canvasContainer">
            <div class="pointer"></div>
            <canvas id="wheelCanvas" width="450" height="450"></canvas>
        </div>
        
        <div class="control-box">
            <input type="text" id="code" readonly>
            <button id="spinBtn" class="btn-main" onclick="spin()">SPIN NOW!</button>
        </div>
    </div>

    <div id="leaderboard">
        <h3 style="margin: 0; color: var(--dark-navy); text-align: center; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px;">🏆 Lucky Winners</h3>
        <div id="winner-list">
            <p style="text-align: center; color: #94a3b8; margin-top: 20px;">Waiting for winners...</p>
        </div>
    </div>
</div>

<footer>
    <div class="footer-left">
        <div class="footer-logo-text">
            <img src="H&L transparent.png" alt="LuckyDraw Logo" class="footer-logo-img">
        </div>
        <div class="footer-copyright">© 2026 H & L Retail Sdn. Bhd.</div>
    </div>
    <div class="footer-right">
        <div class="social-links">
            <a href="https://www.facebook.com/HnLsupermarket/"><i class="fab fa-facebook"></i></a>
            <a href="https://www.instagram.com/hnl_retail/"><i class="fab fa-instagram"></i></a>
            <a href="https://x.com/HnLOfficial"><i class="fab fa-x-twitter"></i></a>
            <a href="https://www.youtube.com/@HnLsupermarket"><i class="fab fa-youtube"></i></a>
            <a href="https://www.hlgroup.com.my/"><i class="fas fa-globe"></i></a>
            <a href="https://t.me/hnlsupermarketkch"><i class="fa fa-telegram"></i></a>
        </div>
        <div class="footer-made-with">Made with ❤️ from H & L</div>
    </div>
</footer>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCSwkGsdm8D5I_RkgEN61FrZn88zROpbH4",
  authDomain: "lucky-draw-66c24.firebaseapp.com",
  projectId: "lucky-draw-66c24",
  storageBucket: "lucky-draw-66c24.firebasestorage.app",
  messagingSenderId: "74967658228",
  appId: "1:74967658228:web:759c4e5419362838cff8a1"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const authorizedStaff = ["FOO YEN PING", "LAI YEE SIUNG", "ROSNI ANAK POSENG", "CHONG JEW HIN", "TAN KIM YEAN", "NORHAYATI BINTI SUUT", "SITI AISHAH BINTI KALAHIM", "MAHAMAD RIZUAN BIN MADZHI", "DESY ANAK LUKAN", "CHRISTINA CHENDU ANAK FRANCIS", "SOFHIA PETI ANAK PETER", "SITI NORAISHAH BINTI UTEH", "LOW CHIN TING", "PETER MATIUS ANAK NYOGEM", "ROS ANAK ROBERT BOBIL", "SITI ANAK AMPING", "ARTI BINTI SAIT", "JENNIFER TANI ANAK JOHNNY", "SHERON ANAK EGAT", "PETER ANAK EDWARD AHOW", "KHO BEE IAN", "BIBI ERNNA BINTI MUHAMMAD FIRDAUS", "STEPHANIE NADIA ANAK ALAN", "SHARON ANAK SAMAT", "BASILIO APAU ANAK GREGORY", "SITI RASHIDAH BINTI AHMAD"];

const prizeImages = { 
    "TRY AGAIN": "https://cdn-icons-png.flaticon.com/512/1791/1791385.png" 
};

let theWheel;
let availablePrizes = [];

function listenToLeaderboard() {
    db.collection("users").where("used", "==", true).onSnapshot((snapshot) => {
        const listDiv = document.getElementById("winner-list");
        listDiv.innerHTML = "";
        if (snapshot.empty) {
            listDiv.innerHTML = '<p style="text-align: center; color: #94a3b8; margin-top: 20px;">Waiting for winners...</p>';
            return;
        }
        let winners = [];
        snapshot.forEach((doc) => winners.push(doc.data()));
        winners.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
        winners.forEach((data) => {
            if (data.prize && data.prize !== "" && data.prize !== "TRY AGAIN") {
                const item = document.createElement("div");
                item.className = "winner-item";
                item.innerHTML = `<strong>${data.name}</strong> <span class="winner-prize">${data.prize}</span>`;
                listDiv.appendChild(item);
            }
        });
    });
}

async function loadPrizes() {
    const snapshot = await db.collection("prizes_stock").where("stock", ">", 0).get();
    availablePrizes = [];
    snapshot.forEach(doc => availablePrizes.push(doc.id));
    if (availablePrizes.length === 0) {
        Swal.fire("Finished", "All prizes have been won!", "info");
        return false;
    }
    availablePrizes.sort(() => Math.random() - 0.5);
    let segments = availablePrizes.map((p, i) => {
        const colors = ['#1a237e', '#D4AF37', '#283593', '#C5A028', '#3949ab'];
        return { 'fillStyle': colors[i % colors.length], 'text': p, 'textFillStyle': 'white', 'fontSize': 14 };
    });
    theWheel = new Winwheel({
        canvasId: 'wheelCanvas',
        numSegments: segments.length,
        segments: segments,
        animation: { 'type': 'spinToStop', 'duration': 10, 'spins': 15, 'callbackFinished': showResult }
    });
    theWheel.draw();
    listenToLeaderboard();
    return true;
}

async function generateCode() {
    const nameInput = document.getElementById("staffName").value.trim();
    if (!nameInput) return Swal.fire("Oops!", "Please enter your name.", "warning");
    if (!authorizedStaff.includes(nameInput)) return Swal.fire("Access Denied", "Name not found.", "error");

    try {
        const q = await db.collection("users").where("name", "==", nameInput).get();
        if (!q.empty) return Swal.fire("Sorry", "You are already registered!", "error");
        const success = await loadPrizes();
        if (!success) return;
        const newCode = "LCK" + Math.floor(1000 + Math.random() * 9000);
        await db.collection("users").doc(newCode).set({ name: nameInput, used: false, prize: "", timestamp: null });
        document.getElementById("code").value = newCode;
        document.getElementById("home-page").style.display = "none";
        document.getElementById("wheel-page").style.display = "flex";
    } catch (e) { Swal.fire("Error", "Check your connection.", "error"); }
}

function spin() {
    window.chosenPrize = availablePrizes[Math.floor(Math.random() * availablePrizes.length)];
    let stopIndex = 1;
    theWheel.segments.forEach((s, i) => { if (s && s.text === window.chosenPrize) stopIndex = i; });
    theWheel.animation.stopAngle = theWheel.getRandomForSegment(stopIndex);
    document.getElementById("spinBtn").disabled = true;
    theWheel.startAnimation();
}

async function showResult() {
    let prizeText = theWheel.getIndicatedSegment().text;
    const code = document.getElementById("code").value;
    const docRef = db.collection("users").doc(code);

    if(prizeText !== "TRY AGAIN") {
        await db.collection("prizes_stock").doc(prizeText).update({ stock: firebase.firestore.FieldValue.increment(-1) });
        // Grand Confetti Effect
        var duration = 5 * 1000;
        var animationEnd = Date.now() + duration;
        var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 9999, colors: ['#D4AF37', '#ffffff', '#4169E1'] };
        function randomInRange(min, max) { return Math.random() * (max - min) + min; }
        var interval = setInterval(function() {
            var timeLeft = animationEnd - Date.now();
            if (timeLeft <= 0) return clearInterval(interval);
            var particleCount = 50 * (timeLeft / duration);
            confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
            confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
        }, 250);
    }
    
    await docRef.update({ used: true, prize: prizeText, timestamp: firebase.firestore.FieldValue.serverTimestamp() });

    Swal.fire({
        title: prizeText === "TRY AGAIN" ? 'OH NO!' : '🎉 CONGRATULATIONS! 🎉',
        html: `<b style="font-size: 22px; color: #1a237e;">${prizeText === "TRY AGAIN" ? "Better luck next time!" : "You won " + prizeText}</b>`,
        imageUrl: prizeImages[prizeText] || 'https://cdn-icons-png.flaticon.com/512/3112/3112733.png',
        imageWidth: 200, imageHeight: 200,
        confirmButtonColor: '#1a237e',
        confirmButtonText: 'Thank You!'
    }).then(() => {
        document.getElementById("spinBtn").innerText = "FINISHED";
        document.getElementById("spinBtn").style.background = "#94a3b8";
    });
}
</script>
</body>
</html>
