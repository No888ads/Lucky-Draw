function applySmartCrop(img) {
    const targetSize = 132;
    img.onload = function() {
        img.style.removeProperty('width');
        img.style.removeProperty('height');
        smartcrop.crop(img, { width: targetSize, height: targetSize }).then(function(result) {
            const crop = result.topCrop;
            const scale = targetSize / crop.width;
            img.style.setProperty('width', (img.naturalWidth * scale) + 'px', 'important');
            img.style.setProperty('height', (img.naturalHeight * scale) + 'px', 'important');
            img.style.setProperty('left', (-crop.x * scale) + 'px', 'important');
            img.style.setProperty('top', (-crop.y * scale) + 'px', 'important');
        });
    };
    if (img.complete && img.naturalWidth !== 0) img.onload();
}

            item.className = "winner-item";
            const prizeStyle = data.prize === "Consolation Prize" ? "color: #94a3b8;" : "color: var(--royal-blue); font-weight: 700;";
            item.innerHTML = `<strong>${data.name}</strong> <span style="${prizeStyle}">${data.prize}</span>`;
            listDiv.appendChild(item);
        });
    });
}

function spin() {
    if (!availablePrizes.length) return;
    window.chosenPrize = availablePrizes[Math.floor(Math.random() * availablePrizes.length)];
    let stopIndex = 1;
    theWheel.segments.forEach((s, i) => { if (s && s.text === window.chosenPrize) stopIndex = i; });
    theWheel.animation.stopAngle = theWheel.getRandomForSegment(stopIndex);
    document.getElementById("spinBtn").disabled = true;
    theWheel.startAnimation();
}

async function showResult() {
    let prizeText = theWheel.getIndicatedSegment().text;
    const code = document.getElementById("code").value;
    const docRef = db.collection("users").doc(code);
    const prizeImgUrl = prizeImages[prizeText] || "";
    if(prizeText !== "Consolation Prize") {
        new Audio('win.mp3').play().catch(() => {});
        await db.collection("prizes_stock").doc(prizeText).update({ stock: firebase.firestore.FieldValue.increment(-1) });
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
    } else { new Audio('lose.mp3').play().catch(() => {}); }
    await docRef.update({ used: true, prize: prizeText, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
    Swal.fire({
        title: prizeText === "Consolation Prize" ? 'TRY AGAIN!' : '🎉 CONGRATS! 🎉',
        html: `<div style="text-align: center;"><img src="${prizeImgUrl}" style="width: 250px; height: 250px; object-fit: contain; margin-bottom: 15px;"><br><b style="font-size: 20px;">You won ${prizeText}</b></div>`,
        confirmButtonColor: '#1a237e'
    }).then(() => {
        document.getElementById("spinBtn").innerText = "FINISHED";
        document.getElementById("spinBtn").style.background = "#94a3b8";
    });
}
</script>
</body>
</html>
