<!DOCTYPE html>
<html>
<head>
    <title> Lucky Draw </title>
    <link rel="icon" type="image/png" href="HL_Transparent.png?v=1">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/2.1.3/TweenMax.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/zarocknz/javascript-winwheel@master/Winwheel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/smartcrop/2.0.5/smartcrop.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root {
            --royal-blue: #4169E1;
            --dark-navy: #1a237e;
            --gold: #D4AF37;
            --soft-white: #ffffff;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            margin: 0; 
            display: flex;
            flex-direction: column;
            min-height: 100vh; 
            background: linear-gradient(135deg, var(--royal-blue), var(--dark-navy)); 
            overflow-x: hidden;
        }
        
        #main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        #home-page { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; }
        .company-logo { width: 180px; height: auto; margin-bottom: 20px; filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.3)); }
        .card { background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); color: #333; text-align: center; width: 350px; }

        #wheel-page { 
            display: none; 
            flex-direction: row; 
            align-items: center; 
            justify-content: space-between; 
            width: 98%; 
            max-width: 1400px;
            gap: 20px;
            padding: 40px 20px;
        }
        
        #award-box {
            position: relative;
            width: 340px;
            height: 550px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            overflow: hidden;
        }

        #award-box::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: conic-gradient(transparent, var(--gold), transparent 90%);
            animation: rotateShine 4s linear infinite;
            z-index: 1;
        }

        #award-box::after {
            content: '';
            position: absolute;
            inset: 4px;
            background: white;
            border-radius: 16px;
            z-index: 2;
        }

        @keyframes rotateShine {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #award-box > * { position: relative; z-index: 5; }

        .box-title {
            margin: 0 0 15px 0; color: var(--dark-navy); text-align: center;
            border-bottom: 2px solid var(--gold); padding-bottom: 10px;
            font-size: 18px; letter-spacing: 1px; font-weight: 800;
        }

        #award-display { flex: 1; display: flex; align-items: center; justify-content: center; }
        .award-item { text-align: center; animation: fadeIn 0.8s ease-in-out; width: 100%; }
        
        .award-photo {
            width: 220px; height: 220px; 
            margin: 5px auto 10px;
            position: relative;
            display: flex; align-items: center; justify-content: center;
        }

        .wreath-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 80%; height: 100%;
            z-index: 3;
            pointer-events: none;
        }

        .photo-crop-container {
            width: 132px; height: 132px;
            border-radius: 50%;
            overflow: hidden;
            position: relative;
            z-index: 1;
            background: #fff;
            margin-top: -6px; 
        }

        .award-photo img.staff-img {
            position: absolute !important;
            max-width: none !important;
            width: auto !important;
            height: auto !important;
            display: block;
            top: 0; left: 0;
        }

        .medal-overlay {
            position: absolute;
            bottom: 20px; right: 20px;
            width: 65px; height: auto;
            z-index: 10;
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.4));
        }

        .staff-details {
            text-align: left;
            background: #f8f9fa;
            padding: 12px;
            border-radius: 12px;
            border-left: 4px solid var(--gold);
            margin-top: 5px;
        }
        .staff-details div { font-size: 13px; margin-bottom: 4px; color: #444; }
        .staff-details b { color: var(--dark-navy); }

        .wheel-container-main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .wheel-title { margin-bottom: 25px; color: white; font-size: 28px; font-weight: 800; text-shadow: 2px 3px 6px rgba(0,0,0,0.3); }
        #canvasContainer { position: relative; background: rgba(255, 255, 255, 0.1); padding: 10px; border-radius: 50%; box-shadow: 0 0 30px rgba(0,0,0,0.2); }
        .pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 18px solid transparent; border-right: 18px solid transparent; border-top: 35px solid #ff4757; z-index: 10; }
        .control-box { margin-top: 25px; background: white; padding: 5px 10px; border-radius: 50px; box-shadow: 0 8px 20px rgba(0,0,0,0.3); display: inline-flex; align-items: center; gap: 8px; width: auto; max-width: 250px; }
        #code { text-align: center; font-size: 14px; font-weight: 800; color: var(--dark-navy); border: none; background: transparent; width: 70px; outline: none; border-right: 2px solid #eee; padding-right: 10px; }
        .btn-main { padding: 10px 15px; border-radius: 30px; border: none; background: var(--dark-navy); color: white; cursor: pointer; font-weight: 700; font-size: 13px; transition: 0.3s; white-space: nowrap; }

        #leaderboard {
            width: 340px;
            height: 550px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            border: 2px solid var(--gold);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        #winner-list { flex: 1; overflow-y: auto; margin-top: 5px; font-size: 13px; }
        .winner-item { padding: 8px 0; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; }
        
        /* FOOTER & SOCIAL ICONS */
        footer { 
            width: 100%; background: rgba(10, 15, 60, 0.95); color: white; 
            padding: 15px 60px; display: flex; justify-content: space-between; 
            align-items: center; backdrop-filter: blur(10px); box-sizing: border-box; 
            z-index: 1000; margin-top: auto; 
        }
        .footer-logo-img { height: 65px; width: auto; transform: scale(1.4); transform-origin: left bottom; margin-right: 20px; filter: drop-shadow(0px 0px 5px rgba(255,255,255,0.2)); }
        
/* --- CSS FOOTER YANG DIKEMASKINI --- */
        .footer-right {
            display: flex;
            flex-direction: column; /* Mengatur teks dan ikon secara menegak */
            align-items: flex-end; /* Menjajarkan kandungan ke kanan */
            gap: 10px; /* Jarak antara ikon dan teks */
        }

        .social-icons {
            display: flex;
            gap: 15px; /* Jarak horizontal antara setiap ikon */
        }

        .social-icons a {
            color: #ffffff; /* --- WARNA IKON ASAL (PUTIH) --- */
            font-size: 22px; /* Saiz ikon */
            transition: 0.3s;
            opacity: 0.8; /* Sedikit lutsinar untuk nampak elegan */
            text-decoration: none;
        }

        .social-icons a:hover {
            color: var(--gold); /* --- WARNA IKON BILA DIHALA TETIKUS (EMAS) --- */
            opacity: 1;
            transform: translateY(-3px); /* Kesan ikon terangkat sedikit */
        }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="main-content">
    <div id="home-page">
        <img src="H&L transparent.png" alt="Company Logo" class="company-logo">
        <div class="card">
            <h2 style="color: var(--royal-blue); margin: 0 0 10px 0;">🎡 Lucky Draw</h2>
            <p style="color: #666; font-size: 14px; margin-bottom: 20px;">Staff Login</p>
            <input type="text" id="staffName" placeholder="ENTER FULL NAME" style="padding: 12px; border-radius: 10px; border: 2px solid #e2e8f0; font-size: 14px; width: 85%; margin-bottom: 20px; text-transform: uppercase;">
            <br>
            <button class="btn-main" style="font-size: 16px; padding: 12px 30px;" onclick="generateCode()">LOGIN</button>
        </div>
    </div>

    <div id="wheel-page">
        <div id="award-box">
            <h3 class="box-title">🎖️ STAFF PROFILE</h3>
            <div id="award-display"></div>
        </div>

        <div class="wheel-container-main">
            <h1 class="wheel-title">Good Luck!</h1>
            <div id="canvasContainer">
                <div class="pointer"></div>
                <canvas id="wheelCanvas" width="450" height="450"></canvas>
            </div>
            <div class="control-box">
                <input type="text" id="code" readonly>
                <button id="spinBtn" class="btn-main" onclick="spin()">SPIN NOW!</button>
            </div>
        </div>

        <div id="leaderboard">
            <h3 class="box-title">🏆 LUCKY WINNERS</h3>
            <div id="winner-list">
                <p style="text-align: center; color: #94a3b8; margin-top: 20px;">Waiting for winners...</p>
            </div>
        </div>
    </div>
</div>

<footer>
        <div class="footer-left">
            <img src="H&L transparent.png" alt="Logo" class="footer-logo-img">
            <div class="footer-copyright">© 2026 H & L Retail Sdn. Bhd.</div>
        </div>
        <div class="footer-right">
            <div class="social-icons">
                <a href="https://facebook.com/yourpage" target="_blank" title="Facebook"><i class="fab fa-facebook"></i></a>
                <a href="https://instagram.com/yourpage" target="_blank" title="Instagram"><i class="fab fa-instagram"></i></a>
                <a href="https://tiktok.com/@yourpage" target="_blank" title="TikTok"><i class="fab fa-tiktok"></i></a>
                <a href="https://yourwebsite.com" target="_blank" title="Website"><i class="fas fa-globe"></i></a>
            </div>
            <div style="opacity: 0.8; font-size: 16px;">Made with ❤️ from H & L</div>
        </div>
    </footer>
